<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kerala PSC English Practice — 5700+ MCQs in authentic PSC exam format.">
    <title>Kerala PSC English Practice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
      // Apply saved theme immediately to avoid flash
      (function(){
        var t = localStorage.getItem('psc_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
</head>
<body>
    <div id="app">

        <!-- LANDING -->
        <section id="screen-landing" class="screen active">
            <header class="top-bar">
                <h1>📝 Kerala PSC Practice</h1>
                <button class="theme-toggle" id="theme-toggle-landing" title="Toggle Light/Dark Mode">🌙</button>
            </header>
            <div class="container">
                <h2 class="page-title">Choose a Subject</h2>
                <div class="subject-card" id="subject-english">
                    <div class="subject-icon">📘</div>
                    <div class="subject-body">
                        <h3>English</h3>
                        <p>Grammar &amp; Vocabulary · 25 Topics</p>
                        <span class="subject-count" id="landing-total-qs">0 Questions</span>
                    </div>
                    <span class="arrow">→</span>
                </div>
            </div>
        </section>

        <!-- TOPICS -->
        <section id="screen-topics" class="screen">
            <header class="top-bar">
                <button class="back-link" id="btn-back-landing">← Back</button>
                <h1>📘 English Topics</h1>
                <button class="btn btn-sm" id="btn-quick-mix">⚡ Quick Mix</button>
                <button class="theme-toggle" id="theme-toggle-topics" title="Toggle Light/Dark Mode">🌙</button>
            </header>
            <div class="container">
                <div class="filter-row">
                    <button class="filter-btn active" data-filter="all">All (18)</button>
                    <button class="filter-btn" data-filter="grammar">Grammar</button>
                    <button class="filter-btn" data-filter="vocabulary">Vocabulary</button>
                    <button class="btn btn-sm" id="btn-reset-progress" style="margin-left:auto; background-color:#ef4444; color:white; border-color:#dc2626;">🔄 Reset Progress</button>
                </div>
                <div class="topic-grid" id="topic-grid"></div>
            </div>
        </section>

        <!-- QUIZ — all questions on one page -->
        <section id="screen-quiz" class="screen">
            <header class="top-bar quiz-top">
                <button class="back-link" id="btn-back-topics">← Topics</button>
                <h1 id="quiz-title">Articles</h1>
                <button class="btn btn-sm" id="btn-shuffle-quiz" title="Shuffle Questions">🔀 Shuffle</button>
                <button class="btn btn-sm" id="btn-reset-topic" title="Reset Topic Progress" style="background-color:#ef4444; color:white; border-color:#dc2626; margin-left:8px;">🔄 Reset</button>
                <div class="score-box">
                    <span class="score-correct" id="score-correct">0</span> /
                    <span class="score-total" id="score-total">0</span>
                    <span class="score-label">answered</span>
                </div>
                <button class="theme-toggle" id="theme-toggle-quiz" title="Toggle Light/Dark Mode">🌙</button>
            </header>
            <div class="container quiz-container">
                <div id="quiz-list"></div>
                <div class="quiz-footer">
                    <button class="btn" id="btn-scroll-top">↑ Back to Top</button>
                    <div class="quiz-summary" id="quiz-summary"></div>
                </div>
            </div>
        </section>

    </div>

    <script src="data/articles.js"></script>
    <script src="data/prepositions.js"></script>
    <script src="data/tenses.js"></script>
    <script src="data/subject_verb_agreement.js"></script>
    <script src="data/voice_change.js"></script>
    <script src="data/reported_speech.js"></script>
    <script src="data/question_tags.js"></script>
    <script src="data/degrees.js"></script>
    <script src="data/sentence_correction.js"></script>
    <script src="data/parts_of_speech.js"></script>
    <script src="data/gerunds_infinitives.js"></script>
    <script src="data/correlatives.js"></script>
    <script src="data/synonyms_antonyms.js"></script>
    <script src="data/one_word_substitutions.js"></script>
    <script src="data/idioms_phrases.js"></script>
    <script src="data/phrasal_verbs.js"></script>
    <script src="data/spelling.js"></script>
    <script src="data/confusing_words.js"></script>
    <script src="data/types_of_sentences.js"></script>
    <script src="data/auxiliary_verbs.js"></script>
    <script src="data/nouns_gender_plural.js"></script>
    <script src="data/word_formation.js"></script>
    <script src="data/compound_words.js"></script>
    <script src="data/foreign_words.js"></script>
    <script src="data/abbreviations.js"></script>
    <script src="app.js"></script>
</body>
</html>
